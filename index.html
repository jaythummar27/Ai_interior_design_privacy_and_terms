<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StageCraft — Legal Documents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0F1D3B 0%, #1E3A8A 60%, #3B82F6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }

        .header-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: 2rem;
            color: #0F1D3B;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #64748B;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .documents {
            display: grid;
            gap: 16px;
        }

        .doc-link {
            display: block;
            padding: 20px 24px;
            background: #F1F5F9;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            text-decoration: none;
            color: #0F1D3B;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-align: left;
        }

        .doc-link:hover {
            background: #2563EB;
            color: white;
            border-color: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
        }

        .doc-icon {
            display: inline-block;
            margin-right: 12px;
            font-size: 1.3rem;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
            font-size: 0.85rem;
            color: #64748B;
        }

        .company-info {
            margin-top: 12px;
            font-size: 0.9rem;
            color: #0F1D3B;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="header-icon">🏠</span>
        <h1>StageCraft</h1>
        <h2 style="font-size: 1rem; color: #64748B; font-weight: 400; margin-bottom: 8px;">AI Interior Design</h2>
        
        <p class="subtitle">
            Legal & Policy Documents
        </p>

        <div class="documents">
            <a href="privacypolicy.html" class="doc-link">
                <span class="doc-icon">📋</span>
                Privacy Policy
            </a>
            <a href="termsofuse.html" class="doc-link">
                <span class="doc-icon">⚖️</span>
                Terms of Use
            </a>
        </div>

        <div class="footer">
            <div class="company-info">
                © 2026 LogicGridApps · Mukesh Thummar
            </div>
            <div style="margin-top: 8px;">
                <a href="mailto:logicgridapps@gmail.com" style="color: #2563EB; text-decoration: none;">
                    logicgridapps@gmail.com
                </a>
            </div>
        </div>
    </div>
</body>
</html>
